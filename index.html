<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Modo avião: agência em alerta</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    :root { 
        --primary: #a78bfa;
        --bg: #0c0c14; 
    }
    
    /* Centralização total da aplicação */
    body, html { 
        margin: 0; 
        padding: 0;
        background: #111; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        width: 100vw;
        overflow: hidden; 
        font-family: Arial, sans-serif; 
        touch-action: none;
    }
    
    #viewport { 
        width: 390px; 
        height: 780px; 
        overflow: hidden; 
        position: relative; 
        background: var(--bg); 
        border: 2px solid #333;
        margin: auto; /* Garante centralização no desktop */
    }

    #world { 
        width: 1170px; 
        height: 780px; 
        position: absolute; 
        left: -390px; 
        top: 0; 
        transition: left 0.3s ease; 
    }

    .frame { width: 390px; height: 780px; position: relative; float: left; }
    .frame .bg { width: 390px; height: 780px; display: block; object-fit: cover; pointer-events: none; }

    #header { 
        position: absolute; top: 0; left: 0; width: 100%; height: 80px; 
        background: rgba(0,0,0,0.8); z-index: 1000; padding: 10px; 
        box-sizing: border-box; color: #fff; border-bottom: 2px solid #333; 
    }

    .status-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; font-weight: bold; }
    #progressBarContainer { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
    #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

    #player { position: absolute; width: 60px; height: 60px; pointer-events: none; object-fit: contain; z-index: 2500; transform: translate(-50%, -50%); }

    /* Ajuste dos comandos: mais transparentes e a 40px do fundo */
    #controls { 
        position: absolute; 
        bottom: 40px; 
        left: 50%; 
        transform: translateX(-50%); 
        display: grid; 
        grid-template-columns: repeat(3, 65px); 
        gap: 10px; 
        z-index: 2000; 
    }

    .btn { 
        width: 65px; height: 65px; 
        background: rgba(255,255,255,0.08); /* Mais transparente */
        border-radius: 50%; display: flex; align-items: center; 
        justify-content: center; color: rgba(255,255,255,0.5); font-size: 28px; 
        user-select: none; cursor: pointer; 
        border: 1px solid rgba(255,255,255,0.1); 
        backdrop-filter: blur(2px); 
    }
    .btn:active { background: rgba(255,255,255,0.2); }

    /* Telas iniciais e centralização do botão */
    #splashScreen, #introScreen { 
        position: absolute; inset: 0; z-index: 9500; 
        display: flex; align-items: center; justify-content: center; 
        background: #000; 
    }
    
    #splashBg, #introBg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    
    #splashContent { position: relative; z-index: 1; text-align: center; }
    #splashContent h1 { font-family: 'Press Start 2P', monospace; font-size: 26px; color: #fff; margin: 0 0 15px 0; }
    
    /* Botão de Tela Cheia centralizado no Splash */
    #btnFullscreen {
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 15px 25px;
        font-size: 12px;
        font-family: 'Press Start 2P', monospace;
        cursor: pointer;
        margin-bottom: 20px;
        display: block;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 2px 2px 0 #000;
    }

    #btnSplashComecar { 
        background: #fff; color: #000; border: none; border-radius: 8px; 
        padding: 15px 0; width: 220px; font-size: 14px; font-weight: bold; 
        font-family: 'Press Start 2P', monospace; cursor: pointer; 
    }

    #modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; opacity: 0; transition: opacity 0.3s ease; }
    #modalOverlay.show { display: flex; opacity: 1; }
    .flip-container { perspective: 1000px; width: 320px; min-height: 240px; transform: scale(0.9); transition: transform 0.3s ease; }
    .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back { width: 100%; min-height: 240px; backface-visibility: hidden; background: #17172b; border: 1px solid var(--primary); border-radius: 14px; padding: 20px; box-sizing: border-box; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; justify-content: center; }
    .flip-back { transform: rotateY(180deg); }
    
    #successCheck { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 4000; }
    .check-circle { width: 100px; height: 100px; background: lime; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: white; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform: scale(0); }
    @keyframes pop { to { transform: scale(1); } }

    .hide { opacity: 0 !important; transition: opacity 0.6s ease; pointer-events: none; }
</style>
</head>
<body>

<div id="viewport">
    <div id="splashScreen">
        <video id="splashBg" autoplay muted loop playsinline>
            <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/iniciar-jogo.mp4" type="video/mp4">
        </video>
        <div id="splashContent">
            <h1>5º dia<br>útil</h1>
            <button id="btnFullscreen">TELA CHEIA</button>
            <button id="btnSplashComecar">COMEÇAR</button>
        </div>
    </div>

    <div id="introScreen" style="display:none;">
        <video id="introBg" autoplay muted loop playsinline>
            <source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Intro-angelo.mp4" type="video/mp4">
        </video>
        <div id="introBox" style="position:relative; z-index:1; background:rgba(23,23,43,0.8); padding:20px; border-radius:12px; width:80%; text-align:center; border:1px solid var(--primary);">
            <p id="introText" style="color:#fff; font-size:14px; line-height:1.5; margin-bottom:20px;"></p>
            <button id="btnComecar" style="background:var(--primary); color:#fff; border:none; padding:12px 30px; border-radius:8px; font-weight:bold; cursor:pointer;">JOGAR</button>
        </div>
    </div>

    <div id="header">
        <div class="status-row">
            <span>Tempo: <b id="timer">02:30</b></span>
            <span>Tarefas: <b id="taskCount">0/9</b></span>
        </div>
        <div id="progressBarContainer"><div id="progressBar"></div></div>
    </div>

    <div id="world">
        <div class="frame">
            <video class="bg" autoplay muted loop playsinline><source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/tela-1.mp4" type="video/mp4"></video>
        </div>
        <div class="frame">
            <video class="bg" autoplay muted loop playsinline><source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/tela-2.mp4" type="video/mp4"></video>
        </div>
        <div class="frame">
            <video class="bg" autoplay muted loop playsinline><source src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/tela-3.mp4" type="video/mp4"></video>
        </div>
        <img id="player" src="https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png">
    </div>

    <div id="controls">
        <div></div><div class="btn" onmousedown="startMove('up')" ontouchstart="startMove('up')">▲</div><div></div>
        <div class="btn" onmousedown="startMove('left')" ontouchstart="startMove('left')">◀</div>
        <div class="btn" onmousedown="startMove('down')" ontouchstart="startMove('down')">▼</div>
        <div class="btn" onmousedown="startMove('right')" ontouchstart="startMove('right')">▶</div>
    </div>
</div>

<div id="modalOverlay">
    <div class="flip-container">
        <div class="flip-inner" id="flipInner">
            <div class="flip-front">
                <div style="display:flex; gap:15px; align-items:center;">
                    <div id="npcFace" style="width:60px; height:60px; border:2px solid var(--primary); border-radius:8px; overflow:hidden;"></div>
                    <div>
                        <h3 id="mTitle" style="margin:0; font-size:16px; color:#fff;"></h3>
                        <p id="mDesc" style="font-size:12px; color:#ccc; margin:5px 0 0 0;"></p>
                    </div>
                </div>
                <div id="execBarContainer" style="width:100%; height:10px; background:#222; border-radius:5px; margin-top:15px; overflow:hidden;">
                    <div id="execBar" style="width:0%; height:100%; background:#ffd166;"></div>
                </div>
                <button id="btnDica" onclick="flipCard()" style="display:none; width:100%; margin-top:15px; padding:10px; background:var(--primary); border:none; border-radius:5px; color:#fff; font-weight:bold;">Dica</button>
            </div>
            <div class="flip-back">
                <div id="typed" style="font-size:13px; color:#fff; line-height:1.4;"></div>
                <button id="btnFechar" onclick="closeAndCheck()" style="width:100%; margin-top:15px; padding:10px; background:#ffd166; border:none; border-radius:5px; font-weight:bold;">Continuar</button>
            </div>
        </div>
    </div>
</div>

<div id="successCheck"><div class="check-circle">✔</div></div>
<div id="transitionScreen" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:#fff;">
    <h2>Game over</h2>
    <div id="countdown" style="font-size:60px; color:var(--primary);">3</div>
</div>

<div id="end" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:#fff; padding:30px; text-align:center;">
    <div id="endTxt"></div>
    <div id="endButtons" style="width:100%; max-width:300px; margin-top:20px;"></div>
</div>

<script>
// Lógica de Tela Cheia centralizada
document.getElementById('btnFullscreen').addEventListener('click', () => {
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
    document.getElementById('btnFullscreen').style.display = 'none'; 
});

const walkableZones = [
    {x: 0, y: 0, w: 1170, h: 220}, {x: 0, y: 220, w: 50, h: 360}, {x: 140, y: 380, w: 300, h: 70}, 
    {x: 140, y: 450, w: 200, h: 150}, {x: 320, y: 600, w: 120, h: 180}, {x: 440, y: 650, w: 320, h: 130}, 
    {x: 530, y: 380, w: 140, h: 270}, {x: 340, y: 330, w: 280, h: 110}, {x: 760, y: 380, w: 180, h: 400}, 
    {x: 870, y: 330, w: 200, h: 50}, {x: 1060, y: 220, w: 110, h: 560} 
];

const cards = {
    1: { idName: 'VAL', type: 'red', t:'Validar proposta', d:'Val está esperando com uma proposta na mão.', typed:'No ambiente bancário, adiar decisões aumenta o estresse por antecipação.', rects: [{x: 670, y: 470, w: 90, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Val.png' },
    2: { idName: 'ALINE', type: 'red', t:'Autorizar compra', d:'Aline aguarda autorização.', typed:'Delegar tarefas não urgentes libera energia mental.', rects: [{x: 440, y: 450, w: 90, h: 200}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Aline.png' },
    3: { idName: 'DIONEI', type: 'red', t:'Assinar documento', d:'Dionei precisa da assinatura.', typed:'Urgências reais exigem ação imediata.', rects: [{x: 580, y: 200, w: 120, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Dionei.png' },
    4: { idName: 'GINA', type: 'red', t:'Atender telefone', d:'Gina espera atendimento.', typed:'Interrupções constantes fragmentam a atenção.', rects: [{x: 50, y: 300, w: 90, h: 280}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Gina.png' },
    5: { idName: 'BRUNO', type: 'red', t:'Responder e-mail', d:'Bruno digita no PC.', typed:'E-mails internos raramente são emergências.', rects: [{x: 180, y: 600, w: 140, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Bruno.png' },
    6: { idName: 'MARI', type: 'red', t:'Liberar acesso', d:'Mari aguarda liberação.', typed:'Focar no que é possível resolver reduz o desgaste.', rects: [{x: 140, y: 160, w: 130, h: 180},{x: 140, y: 340, w: 70, h: 100}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Mari.png' },
    7: { idName: 'LORENZA', type: 'red', t:'Ajudar cliente', d:'Lorenza quer falar com o gerente.', typed:'A TCC ensina a responder, não reagir.', rects: [{x: 940, y: 380, w: 120, h: 180}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Lorenza.png' },
    8: { idName: 'NAYARA', type: 'red', t:'Resolver reclamação', d:'Nayara pede ajuda.', typed:'Respirar antes de responder é regulação emocional.', rects: [{x: 740, y: 160, w: 90, h: 220}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Nayara.png' },
    9: { idName: 'STEPHANIE', type: 'red', t:'Fechar relatório', d:'Stephanie fecha o relatório.', typed:'Fechamentos de ciclo geram sensação de controle.', rects: [{x: 830, y: 160, w: 110, h: 170}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Stephanie.png' },
    10:{ idName: 'Cronograma', type: 'red', t:'Cronograma', d:'Planejamento do dia.', typed:'', rects: [{x: 480, y: 230, w: 100, h: 100}], img:'https://psiangelooliveira.com.br/wp-content/uploads/2026/04/Logo_Psi_Angelo_11_opcao_2-1.png' }
};

let pX = 585; let pY = 720; let moveDir = null;
let done = {}, totalTime = 150, isAction = false, gameStarted = false, currentTaskId = null;

document.getElementById('btnSplashComecar').addEventListener('click', () => {
    document.getElementById('splashScreen').classList.add('hide');
    document.getElementById('introScreen').style.display = 'flex';
    setTimeout(typeWriterIntro, 800);
});

document.getElementById('btnComecar').addEventListener('click', () => {
    document.getElementById('introScreen').classList.add('hide');
    gameStarted = true;
});

function startMove(dir) { moveDir = dir; }
function stopMove() { moveDir = null; }
window.addEventListener('mouseup', stopMove); window.addEventListener('touchend', stopMove);

function init() {
    const world = document.getElementById('world');
    Object.keys(cards).forEach(id => {
        const c = cards[id];
        c.rects.forEach((r, index) => {
            const div = document.createElement('div');
            div.className = `zone ${c.type}`;
            div.style.left = r.x + 'px'; div.style.top = r.y + 'px'; div.style.width = r.w + 'px'; div.style.height = r.h + 'px';
            world.appendChild(div);
        });
    });
    setInterval(update, 30);
    startTimer();
}

function startTimer() {
    const tEl = document.getElementById('timer');
    setInterval(() => {
        if(!gameStarted || isAction) return;
        totalTime--;
        let m = Math.floor(totalTime/60), s = totalTime%60;
        tEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(totalTime <= 0) triggerGameOver(false, false);
    }, 1000);
}

function update() {
    if(!gameStarted || isAction) return;
    let nX = pX, nY = pY;
    if(moveDir==='up') nY -= 6; if(moveDir==='down') nY += 6; if(moveDir==='left') nX -= 6; if(moveDir==='right') nX += 6;
    if(nX > 10 && nX < 1160 && nY > 10 && nY < 760) {
        let ok = false;
        for (let z of walkableZones) if (nX >= z.x && nX <= z.x + z.w && nY >= z.y && nY <= z.y + z.h) ok = true;
        for (let id in cards) for (let r of cards[id].rects) if (nX >= r.x && nX <= r.x + r.w && nY >= r.y && nY <= r.y + r.h) ok = true;
        if(ok) { pX = nX; pY = nY; }
    }
    const player = document.getElementById('player');
    player.style.left = pX + 'px'; player.style.top = pY + 'px';
    document.getElementById('world').style.left = `-${Math.floor(pX / 390) * 390}px`;
    
    Object.keys(cards).forEach(id => {
        if(done[id]) return;
        const r = cards[id].rects[0];
        if (pX > r.x && pX < r.x + r.w && pY > r.y && pY < r.y + r.h) openTask(id);
    });
}

function openTask(id) {
    isAction = true; stopMove(); currentTaskId = id;
    const c = cards[id], mo = document.getElementById('modalOverlay'), eb = document.getElementById('execBar');
    document.getElementById('npcFace').innerHTML = `<img src="${c.img}" style="width:100%;height:100%;object-fit:cover;">`;
    document.getElementById('mTitle').textContent = c.t; document.getElementById('mDesc').textContent = c.d;
    mo.style.display = 'flex'; eb.style.width = '0%';
    setTimeout(() => mo.classList.add('show'), 10);
    let p = 0; const iv = setInterval(() => { p++; eb.style.width = p + '%'; if(p>=100){ clearInterval(iv); document.getElementById('btnDica').style.display='block'; } }, 30);
}

function flipCard() {
    document.getElementById('flipInner').classList.add('flipped');
    document.getElementById('typed').textContent = cards[currentTaskId].typed;
}

function closeAndCheck() {
    document.getElementById('modalOverlay').classList.remove('show');
    setTimeout(() => { 
        document.getElementById('modalOverlay').style.display='none'; 
        document.getElementById('flipInner').classList.remove('flipped');
        document.getElementById('btnDica').style.display='none';
        document.getElementById('successCheck').style.display='flex';
        setTimeout(() => { document.getElementById('successCheck').style.display='none'; completeTask(currentTaskId); }, 1000);
    }, 300);
}

function completeTask(id) {
    done[id] = true; isAction = false;
    const count = Object.keys(done).length;
    document.getElementById('taskCount').textContent = count + '/9';
    document.getElementById('progressBar').style.width = (count / 9 * 100) + '%';
    if(count >= 9) triggerGameOver(true, false);
}

function triggerGameOver(win) {
    gameStarted = false;
    document.getElementById('transitionScreen').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('transitionScreen').style.display = 'none';
        document.getElementById('end').style.display = 'flex';
        document.getElementById('endTxt').innerHTML = win ? "Você concluiu todas as tarefas com sucesso!" : "O tempo acabou! Tente novamente.";
        document.getElementById('endButtons').innerHTML = `<button onclick="location.reload()" style="background:var(--primary);color:#fff;border:none;padding:15px;width:100%;border-radius:8px;font-weight:bold;cursor:pointer;">RECOMEÇAR</button>`;
    }, 3000);
}

const introStr = "É hora do dia mais cheio em uma agência.<br><br>E você só precisa navegar pelo banco e executar as tarefas.<br><br>Mas lembre-se: <b>É por onde começa que dita seu ritmo.</b>";
let typeIdx = 0;
function typeWriterIntro() {
    if (typeIdx < introStr.length) {
        document.getElementById('introText').innerHTML = introStr.substring(0, typeIdx + 1);
        typeIdx++; setTimeout(typeWriterIntro, 30);
    }
}

init();
</script>
</body>
</html>
